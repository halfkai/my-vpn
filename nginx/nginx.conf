user nginx;
worker_processes auto;
worker_rlimit_nofile 4096;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

stream {
    map $ssl_preread_server_name $backend {
        xray.<this_should_be_replaced_by_root_domain> xray_reality;
        h2_only.<this_should_be_replaced_by_root_domain> h2_only;
        default web_tls;
    }

    upstream h2_only {
        server 127.0.0.1:9443;
    }

    upstream web_tls {
        server 127.0.0.1:8443; # Web 服务端口
    }

    upstream xray_reality {
        server 127.0.0.1:1443; # Xray 服务端口
    }

    server {
        listen 443 reuseport;
        listen [::]:443 reuseport;

        ssl_preread on;
        proxy_protocol on;

        proxy_pass $backend;
    }
}

http {
    server_tokens off;
    include mime.types;
    default_type application/octet-stream;

    map $http_x_forwarded_for $client_real_ip {
        "" $remote_addr;
        "~*(?P<first_addr>([0-9a-f]{0,4}:){1,7}[0-9a-f]{1,4}|([0-9]{1,3}\.){3}[0-9]{1,3})$" $first_addr;
    }

    port_in_redirect off;

    log_format main
        '$remote_addr [$time_local] "$request" '
        '$status $body_bytes_sent $request_time '
        '"$http_referer" "$http_user_agent" "$http_x_forwarded_for" '
        '"$upstream_addr" "$upstream_status" "$upstream_response_time" '
        '"$client_real_ip" "$http_cf_ipcountry"';
 
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    client_max_body_size 0;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    ssl_certificate /etc/letsencrypt/live/<this_should_be_replaced_by_root_domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<this_should_be_replaced_by_root_domain>/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    set_real_ip_from 127.0.0.1;
    real_ip_header proxy_protocol;

    # 宣告支持 HTTP/3（让支持 h3 的客户端尝试 UDP 443）
    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;


    server {
        listen 80;
        listen [::]:80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 127.0.0.1:8443 ssl proxy_protocol reuseport;
        # HTTP/3 是 QUIC/UDP：必须监听在对外的 UDP 443（stream 里的 TCP 443 不影响这里）
        # listen 443 quic reuseport;
        #listen [::]:443 quic reuseport;

        server_name <this_should_be_replaced_by_root_domain>;

        http2 on;
        
        # 主站 SPA（blog）。其他 SPA 用子域 + conf.d，例如 h2_only.<this_should_be_replaced_by_root_domain> → conf.d/h2_only.conf
        root /usr/share/nginx/html;
        index index.html index.htm 50x.html;

        # Cache static assets (blog)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            add_header Cache-Control "public, max-age=3600" always;
            try_files $uri $uri/ /index.html =404;
        }

        location /<this_should_be_replaced_by_xhttp_path> {
            # XHTTP 推荐用 Nginx 的 gRPC 代理方式（支持前端 h2/h3；避免 proxy_pass 的 HTTP/1.1 反代）
            client_max_body_size 0;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_body_timeout 5m;
            grpc_read_timeout 315;
            grpc_send_timeout 5m;

            grpc_pass grpc://127.0.0.1:2024;
        }
    }

    include conf.d/*.conf;
}
